version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    groups:
      # Kotlin and the Analysis API artifacts are version-locked and must move together;
      # grouping keeps them (and other minor/patch bumps) in one reviewable PR.
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Caffeine is pinned to the version the Analysis API `-for-ide` jars expect
      # (see gradle/libs.versions.toml) — don't propose major bumps.
      - dependency-name: "com.github.ben-manes.caffeine:caffeine"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # codeql-action init/analyze pins must move in the same PR (mixed versions fail
      # with "Loaded a configuration file for version X, but running version Y");
      # grouping all action bumps also keeps the weekly churn to one PR.
      github-actions:
        patterns: ["*"]

  # Keeps the digest-pinned eclipse-temurin base image fresh (JRE CVE patches).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
