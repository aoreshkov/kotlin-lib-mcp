version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    groups:
      # Kotlin and the Analysis API artifacts are version-locked and must move together;
      # grouping keeps them (and other minor/patch bumps) in one reviewable PR.
      minor-and-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
