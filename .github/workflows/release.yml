name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  github-release:
    name: GitHub Release (server zip)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check tag matches project version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "^version=${VERSION}$" gradle.properties || {
            echo "Tag ${GITHUB_REF_NAME} does not match version in gradle.properties"; exit 1; }

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Build server distribution
        run: ./gradlew :server:installDist

      - name: Package distribution
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd server/build/install
          mv server "kotlin-lib-mcp-server-${VERSION}"
          zip -qr "kotlin-lib-mcp-server-${VERSION}.zip" "kotlin-lib-mcp-server-${VERSION}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: server/build/install/kotlin-lib-mcp-server-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Build server distribution
        run: ./gradlew :server:installDist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/kotlin-lib-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The MCP registry validates OCI packages via this annotation.
          annotations: |
            io.modelcontextprotocol.server.name=io.github.aoreshkov/kotlin-lib-mcp

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [github-release, docker]
    permissions:
      id-token: write # GitHub OIDC login to the registry — no stored secret
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install mcp-publisher
        env:
          # Pinned + checksum-verified: this binary runs in the job holding the
          # id-token:write registry-publish credential. Bump deliberately — take the
          # new SHA-256 from the release's registry_<version>_checksums.txt asset.
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          curl -fsSLO "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher_linux_amd64.tar.gz" | sha256sum -c -
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher

      - name: Sync server.json version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
             '.version = $v | .packages[0].identifier = "ghcr.io/aoreshkov/kotlin-lib-mcp:" + $v' \
             server.json > server.json.tmp && mv server.json.tmp server.json
          cat server.json

      - name: Login and publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
