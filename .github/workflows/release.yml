name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  github-release:
    name: GitHub Release (server zip)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches project version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "^version=${VERSION}$" gradle.properties || {
            echo "Tag ${GITHUB_REF_NAME} does not match version in gradle.properties"; exit 1; }

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Build server distribution
        run: ./gradlew :server:installDist

      - name: Package distribution
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd server/build/install
          mv server "kotlin-lib-mcp-server-${VERSION}"
          zip -qr "kotlin-lib-mcp-server-${VERSION}.zip" "kotlin-lib-mcp-server-${VERSION}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: server/build/install/kotlin-lib-mcp-server-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Build server distribution
        run: ./gradlew :server:installDist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kotlin-lib-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The MCP registry validates OCI packages via this annotation.
          annotations: |
            io.modelcontextprotocol.server.name=io.github.aoreshkov/kotlin-lib-mcp

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [github-release, docker]
    permissions:
      id-token: write # GitHub OIDC login to the registry — no stored secret
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher

      - name: Sync server.json version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
             '.version = $v | .packages[0].identifier = "ghcr.io/aoreshkov/kotlin-lib-mcp:" + $v' \
             server.json > server.json.tmp && mv server.json.tmp server.json
          cat server.json

      - name: Login and publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
